    - title: Undergraduate Thesis
      year: 2024
      description:
        - title: Dynamic Analysis of Rooppur Nuclear Power Plant Under Seismic and Wind Loading
          contents:
            - Developed a Finite Element model of the cooling tower in ABAQUS software.
            - Modelled the shell structure as Continuum shell and Conventional shell elements.
            - Compared simplified and heterogeneous design column modelling approaches.
            - Conducted non-linear time history analysis under earthquake loading.
            - Applied wind loading using the Greiner equation approach via ABAQUS Analytical Field.

